# OneClaw - Complete Stack
# 
# Run everything with one command:
#   docker-compose up
#
# Access daemon at: http://localhost:8787
# Access harness at: http://localhost:9000
# Access API at: http://localhost:3000

version: '3.8'

services:
  # Harness - Tool execution engine
  harness:
    build:
      context: .
      dockerfile: packages/harness/Dockerfile
    container_name: oneclaw-harness
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=9000
      # LLM
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      # Database
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      # Business Tools
      - APIFY_API_TOKEN=${APIFY_API_TOKEN:-}
      # Gmail
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - harness-data:/app/data
      - ./logs:/app/logs
    networks:
      - oneclaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API - OAuth proxy and control plane
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: oneclaw-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - HARNESS_URL=http://harness:9000
      # Database
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      # Gmail OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:3000/oauth/google/callback}
      # Stripe (optional)
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      harness:
        condition: service_healthy
    networks:
      - oneclaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Daemon - Rust agent runtime
  daemon:
    build:
      context: ./oneclaw-node
      dockerfile: Dockerfile
    container_name: oneclaw-daemon
    ports:
      - "8787:8787"
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - HARNESS_URL=http://harness:9000
      - API_URL=http://api:3000
      # LLM (daemon needs direct access for chat)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      # Workspace directory (for SOUL.md, SKILLS.md, etc.)
      - daemon-workspace:/root/.oneclaw/workspace
      # SQLite database
      - daemon-data:/root/.oneclaw/data
      # Logs
      - ./logs:/app/logs
    depends_on:
      harness:
        condition: service_healthy
    networks:
      - oneclaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  harness-data:
    driver: local
  daemon-workspace:
    driver: local
  daemon-data:
    driver: local

networks:
  oneclaw-network:
    driver: bridge
